# dataconnect/schema/schema.gql

type Category @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  imageUrl: String
  orderIndex: Int!
}

type Product @table {
  id: UUID! @default(expr: "uuidV4()")
  name: String!
  description: String!
  price: Float!
  imageUrl: String
  isAvailable: Boolean! @default(value: true)
  
  category: Category! 
}
type Order @table {
  id: UUID! 
  total: Float!
  status: String! @default(value: "received")
  createdAt: Timestamp! @default(expr: "request.time")
}

type OrderItem @table {
  id: UUID! @default(expr: "uuidV4()")
  productName: String!
  quantity: Int!
  order: Order!
}