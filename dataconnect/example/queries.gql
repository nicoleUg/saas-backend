
query GetCategories @auth(level: PUBLIC) {
  categories(orderBy: [{ orderIndex: ASC }]) {
    id
    name
    imageUrl
    orderIndex
  }
}

query GetProductsByCategory($categoryId: UUID!) @auth(level: PUBLIC) {
  products(where: { categoryId: { eq: $categoryId } }) {
    id
    name
    description
    price
    imageUrl
    isAvailable
  }
}