# dataconnect/example/mutations.gql

mutation CreateCategory($name: String!, $orderIndex: Int!, $imageUrl: String) @auth(level: NO_ACCESS) {
  category_insert(data: { name: $name, orderIndex: $orderIndex, imageUrl: $imageUrl })
}

mutation CreateProduct($categoryId: UUID!, $name: String!, $description: String!, $price: Float!, $imageUrl: String) @auth(level: NO_ACCESS) {
  product_insert(data: { categoryId: $categoryId, name: $name, description: $description, price: $price, imageUrl: $imageUrl })
}
mutation CreateOrder($id: UUID!, $total: Float!, $status: String!, $tableNumber: Int!, $userId: UUID!) @auth(level: NO_ACCESS) {
  order_insert(data: { id: $id, total: $total, status: $status, tableNumber: $tableNumber, userId: $userId })
}

mutation CreateOrderItem($orderId: UUID!, $productName: String!, $quantity: Int!) @auth(level: NO_ACCESS) {
  orderItem_insert(data: { orderId: $orderId, productName: $productName, quantity: $quantity })
}
mutation CreateUser($email: String!, $passwordHash: String!, $name: String!, $role: String) @auth(level: NO_ACCESS) {
  user_insert(data: { email: $email, passwordHash: $passwordHash, name: $name, role: $role })
}

mutation UpdateOrderStatus($id: UUID!, $status: String!) @auth(level: NO_ACCESS) {
  order_update(key: { id: $id }, data: { status: $status })
}

mutation UpdateProduct($id: UUID!, $categoryId: UUID, $name: String, $description: String, $price: Float, $imageUrl: String, $isAvailable: Boolean) @auth(level: NO_ACCESS) {
  product_update(key: { id: $id }, data: { categoryId: $categoryId, name: $name, description: $description, price: $price, imageUrl: $imageUrl, isAvailable: $isAvailable })
}

mutation DeleteProduct($id: UUID!) @auth(level: NO_ACCESS) {
  product_delete(key: { id: $id })
}

mutation UpdateCategory($id: UUID!, $name: String, $orderIndex: Int, $imageUrl: String) @auth(level: NO_ACCESS) {
  category_update(key: { id: $id }, data: { name: $name, orderIndex: $orderIndex, imageUrl: $imageUrl })
}

mutation DeleteCategory($id: UUID!) @auth(level: NO_ACCESS) {
  category_delete(key: { id: $id })
}

mutation CreateReview($productId: UUID!, $userId: UUID!, $rating: Int!, $comment: String!) @auth(level: NO_ACCESS) {
  review_insert(data: { productId: $productId, userId: $userId, rating: $rating, comment: $comment })
}

mutation CreateFavorite($productId: UUID!, $userId: UUID!) @auth(level: NO_ACCESS) {
  favorite_insert(data: { productId: $productId, userId: $userId })
}

mutation DeleteFavorite($productId: UUID!, $userId: UUID!) @auth(level: NO_ACCESS) {
  favorite_deleteMany(where: { productId: { eq: $productId }, userId: { eq: $userId } })
}